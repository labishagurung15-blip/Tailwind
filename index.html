<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Web Summit - Tailwind Project</title>
</head>
<body class="bg-white text-slate-800">
    <nav class="sticky top-0 z-50 bg-white border-b border-slate-100 shadow-sm">
        <div class="max-w-5xl mx-auto px-6 py-4 flex item-center justify-between ">
            <span class="font-display text-xl font-bold text-indigo-600">Webcraft</span>
            <ul class="hidden md:flex gap-8">
                <li><a href="#" class="text-sm font-medium text-slate-500 hover:text-indigo-600">About</a>
                    <a href="#" class="text-sm font-medium text-slate-500 hover:text-indigo-600">Schedule</a>
                    <a href="#" class="text-sm font-medium text-slate-500 hover:text-indigo-600">Speaker</a>
                </li>

            </ul>
        </div>
    </nav>
    <!-- end of nav -->

    <section class="bg-gradient-to-br from-indigo-50 to-white">
        <div class="max-w-5xl mx-auto px-6 py-25 text-center">
            <span class="inline-block bg-indigo-100 text-indigo-700 text-xs font-semibold px-6 py-4 rounded-full uppercase tracking-widest mb-6">
                Annual Event. 2026
            </span>
            <h1 class="font-serif display text-5xl md:text-7xl font-extrabold text-slate-900 leading-tight mb-6">
                Webcraft <br />
                <span class="text-indigo-600">Summit</span>
            </h1>
            <p class="text-lg md:text-xl text-slate-500 mx-w-xl mx-auto mb-10">
                A one day gathering for designers, developers and visionaries to 
                explore the possibilities of modern web development
            </p>
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="#" class="bg-indigo-600 text-white px-8 py-3.5 rounded-full text-semibold text-base hover:bg-indigo-700 transition-colors shadow-lg shadow-indigo-200"
                >
                Get your ticket</a>
                
                <a href="#"class="border-2 border-slate-200 text-slate-700 px-8 py-3.5 rounded-full font-semibold hover:border-slate-400 hover:bg-slate-50 transition-colors">Learn More</a>
            </div>
        </div>
    </section>
    <!-- end of hero-section -->

    <section class="py-20 bg-white">
        <div class="max-w-5xl mx-auto px-6">
            <div class="text-center mb-12">
                <p
                  class="text-sm font-semibold text-indigo-500 uppercase tracking-widest mb-2"
                  >
                   Event Details
                </p>
                <h2 class="font-display text-3xl font-bold text-slate-900">
                   Everything you need to know about the event
                </h2>
            </div>
        </div>
    </section>
</body>
</html>
